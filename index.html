<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyRadio</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>📻</text></svg>">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="HyRadio">
    <meta name="mobile-web-app-capable" content="yes">
    
    <meta name="theme-color" content="#1e1e2e">
</head>

<body>

    <header class="top-bar">
        <div class="top-bar-content">
            <span>> ESTADO: <span id="status" class="status-text">Detenido</span></span>
            <span class="separator">|</span>
            <span>> STREAM: <span id="current-station" class="stream-text">Ninguno</span></span>
            <span class="separator">|</span>

            <audio id="audio-player"></audio>
            <button class="main-btn" onclick="playRadio()">[ Play ]</button>
            <button class="main-btn" onclick="stopRadio()">[ Stop ]</button>

            <span class="separator">|</span>
            <div class="volume-container">
                <span>VOL</span>
                <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="0.5">
                <span class="vol-text" id="volume-text">[ 50% ]</span>
            </div>
            <span class="separator">|</span>
            <div class="theme-container" style="display: flex; align-items: center; gap: 10px;">
                <span>TEMA:</span>
                <select id="theme-select" class="theme-select" onchange="changeTheme()">
                    <optgroup label="Catppuccin">
                        <option value="mocha">Mocha (Oscuro)</option>
                        <option value="macchiato">Macchiato</option>
                        <option value="frappe">Frappé</option>
                        <option value="latte">Latte (Claro)</option>
                    </optgroup>
                    <optgroup label="Modernos / Programación">
                        <option value="dracula">Dracula</option>
                        <option value="nord">Nord</option>
                        <option value="tokyonight">Tokyo Night</option>
                        <option value="onedark">One Dark</option>
                        <option value="monokai">Monokai</option>
                    </optgroup>
                    <optgroup label="Vintage / Cálidos">
                        <option value="gruvbox-dark">Gruvbox Dark</option>
                        <option value="gruvbox-light">Gruvbox Light</option>
                        <option value="solarized-dark">Solarized Dark</option>
                        <option value="solarized-light">Solarized Light</option>
                    </optgroup>
                    <optgroup label="Neón / Cyberpunk">
                        <option value="cyberpunk">Cyberpunk 2077</option>
                        <option value="synthwave">Synthwave '84</option>
                        <option value="hacker">Matrix Hacker</option>
                    </optgroup>
                    <optgroup label="Monitores CRT Clásicos">
                        <option value="retro-green">Fósforo Verde</option>
                        <option value="retro-amber">Fósforo Ámbar</option>
                        <option value="retro-cyan">Fósforo Cian</option>
                    </optgroup>
                </select>
            </div>

        </div>
    </header>
    </div>
    </header>

    <div class="container">
        <h1>[ webradio@mocha:~ ]# ./play.sh</h1>
        <p>Selecciona una emisora de la lista:</p>

        <ul class="station-list" id="station-list"></ul>

        <div class="console-box"> <!-- Agregar emisora -->
            <p>> agregar estación./add_stream.sh</p>
            <input type="text" id="new-name" placeholder="Nombre (ej. Vorterix)">
            <input type="text" id="new-url" placeholder="URL (ej. http://stream.com/live.mp3)">
            <button class="main-btn" onclick="addNewStation()">[ Agregar ]</button>
        </div>
        <div class="console-box"> <!-- Exportar e importar lista de radios -->
            <p>> hacer copia de seguridad./backup_db.sh</p>
            <input type="file" id="import-file" style="display: none;" accept=".json" onchange="importStations(event)">
            <button class="main-btn" onclick="exportStations()">[ Exportar emisoras ]</button>
            <button class="main-btn" onclick="document.getElementById('import-file').click()">[ Importar emisoras
                ]</button>
        </div>
    </div>

    <footer class="bottom-bar">
        <div class="bottom-bar-content">
            <span class="now-playing-label">> AHORA SUENA:</span>
            <marquee class="now-playing-text" id="now-playing" scrollamount="4">
                [ Esperando conexión... ]
            </marquee>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
